services:
  postgres:
    image: postgres:16-alpine
    container_name: numble-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-numble}
      POSTGRES_USER: ${POSTGRES_USER:-numble}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-numble}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: numble-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-numble}:${POSTGRES_PASSWORD:-numble}@postgres:5432/${POSTGRES_DB:-numble}}
      DB_PATH: ${DB_PATH:-/data/users_db}
      BIND_ADDRESS: 0.0.0.0:3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - backend-data:/data

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: numble-front
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend-data:
  postgres-data:
