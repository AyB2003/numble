services:
  postgres:
    image: postgres:16-alpine
    container_name: numble-postgres
    environment:
      POSTGRES_DB: numble
      POSTGRES_USER: numble
      POSTGRES_PASSWORD: numble
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: numble-backend
    environment:
      JWT_SECRET: dev-secret-change-me
      DATABASE_URL: postgres://numble:numble@postgres:5432/numble
      DB_PATH: /data/users_db
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - backend-data:/data

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: numble-front
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend-data:
  postgres-data:
